site_name: Venom VNV Docs
site_description: 基于 ROS 2 Humble 的通用机器人系统文档
site_url: https://venom-algorithm.github.io/Venom_VNV/
repo_url: https://github.com/Venom-Algorithm/Venom_VNV
repo_name: Venom-Algorithm/Venom_VNV
docs_dir: docs
site_dir: site
use_directory_urls: true

theme:
  name: material
  language: zh
  features:
    - content.code.copy
    - navigation.indexes
    - navigation.sections
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - search.highlight
    - search.suggest
    - toc.follow
  palette:
    - scheme: slate
      primary: teal
      accent: cyan

extra:
  alternate:
    - name: 中文
      link: /Venom_VNV/
      lang: zh
    - name: English
      link: /Venom_VNV/en/
      lang: en

extra_css:
  - assets/stylesheets/extra.css

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets

plugins:
  - search:
      lang:
        - zh
        - en
  - redirects:
      redirect_maps:
        home/index.md: index.md
        quick_start.md: home/quick_start.md
        launch_usage.md: home/launch_usage.md
        environment.md: deployment/environment.md
